<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Rumah Sakit - Login Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6 untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f1f5f9 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }
        .card-login {
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            background: #ffffff;
            transition: transform 0.3s ease;
        }
        .hospital-icon-box {
            background: linear-gradient(135deg, #0284c7, #06b6d4);
            color: white;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3);
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }
        .input-group-text {
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
            color: #94a3b8;
            padding-left: 15px;
            padding-right: 15px;
        }
        .btn-login {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(2, 132, 199, 0.3);
            background: linear-gradient(135deg, #0369a1, #075985);
        }
        .link-custom {
            color: #0284c7;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .link-custom:hover {
            color: #0369a1;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card card-login p-4 p-sm-5">
            
            <!-- Header Card (Tema Rumah Sakit) -->
            <div class="text-center mb-4">
                <div class="hospital-icon-box">
                    <i class="fa-solid fa-hospital-user fa-2x"></i>
                </div>
                <h4 class="fw-bold text-dark m-0">Portal Admin RS</h4>
                <p class="text-muted small mt-1">Sistem Informasi Manajemen Rumah Sakit</p>
            </div>

            <!-- Form Login -->
            <form id="loginForm">
                <!-- Input Username -->
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Username Admin</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user-shield"></i></span>
                        <input type="text" id="username" class="form-control" placeholder="Masukkan username" required autocomplete="off">
                    </div>
                </div>
                
                <!-- Input Password -->
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-secondary">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                
                <!-- Tombol Submit -->
                <button type="submit" class="btn btn-primary btn-login w-100 text-white mb-3">MASUK SYSTEM</button>
                
                <!-- Navigasi / Link -->
                <div class="text-center mt-2">
                    <p class="small text-muted mb-2">Belum punya akun? <a href="register.html" class="link-custom">Daftar di sini</a></p>
                    <hr class="text-muted my-3 opacity-25">
                    <a href="index.html" class="text-secondary small text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Kembali ke Publik</a>
                </div>
            </form>
            
        </div>
    </div>

    <!-- JavaScript Handling Login (Menggunakan LocalStorage) -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;

            // Mengambil data user yang terdaftar dari localStorage
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Akun bawaan (default) jika data kosong agar Anda tetap bisa login sebagai 'admin'
            if (users.length === 0) {
                users.push({ username: "admin", password: "admin" });
                localStorage.setItem('users', JSON.stringify(users));
            }

            // Validasi kecocokan data akun
            const userFound = users.find(user => user.username.toLowerCase() === usernameInput.toLowerCase() && user.password === passwordInput);

            if (userFound) {
                sessionStorage.setItem('loggedInUser', usernameInput);
                alert('Login Berhasil! Selamat datang di Sistem Informasi Rumah Sakit.');
                window.location.href = 'dashboard.html';
            } else {
                alert('Gagal Masuk! Username atau Password salah.');
            }
        });
    </script>
</body>
</html>
