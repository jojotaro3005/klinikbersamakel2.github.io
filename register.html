<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Rumah Sakit - Daftar Admin Baru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e2f8f0 0%, #f1f5f9 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }
        .login-container { width: 100%; max-width: 420px; padding: 15px; }
        .card-login { border: none; border-radius: 24px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08); background: #ffffff; }
        .hospital-icon-box {
            background: linear-gradient(135deg, #059669, #10b981); color: white;
            width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;
            border-radius: 20px; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        .form-control { border-radius: 12px; padding: 12px 15px; border: 1.5px solid #e2e8f0; background-color: #f8fafc; }
        .form-control:focus { background-color: #fff; border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15); }
        .input-group-text { border-radius: 12px; border: 1.5px solid #e2e8f0; background-color: #f8fafc; color: #94a3b8; }
        .btn-register {
            background: linear-gradient(135deg, #059669, #047857); border: none; border-radius: 12px;
            padding: 12px; font-weight: 600; letter-spacing: 0.5px; transition: all 0.3s ease;
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(5, 150, 105, 0.3); }
        .link-custom { color: #059669; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card card-login p-4 p-sm-5">
            <div class="text-center mb-4">
                <div class="hospital-icon-box">
                    <i class="fa-solid fa-user-plus fa-2x"></i>
                </div>
                <h4 class="fw-bold text-dark m-0">Daftar Akun Admin</h4>
                <p class="text-muted small mt-1">Buat kredensial admin medis baru</p>
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Username Baru</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="regUsername" class="form-control" placeholder="Buat nama pengguna" required autocomplete="off">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-secondary">Password Baru</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                        <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-success btn-register w-100 text-white mb-3">DAFTAR SEKARANG</button>
                <div class="text-center mt-2">
                    <p class="small text-muted mb-0">Sudah punya akun? <a href="login.html" class="link-custom">Login di sini</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;

            let users = JSON.parse(localStorage.getItem('users')) || [];
            const userExists = users.some(user => user.username.toLowerCase() === username.toLowerCase());

            if (userExists) {
                alert('Username sudah terdaftar! Gunakan nama lain.');
            } else {
                users.push({ username: username, password: password });
                localStorage.setItem('users', JSON.stringify(users));
                alert('Akun Admin Berhasil Dibuat! Anda akan dialihkan ke halaman login.');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
